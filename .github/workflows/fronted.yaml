name: Fronted Workflow

on:
  pull_request:
    branches :
      - dev
      - main
    paths:
      - 'app/front/**'
      
jobs:
  linter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app/front
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './app/front/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npx eslint .

    - name: Build Check
      run: npm run build

